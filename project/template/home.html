<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Coding Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

body{

    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    padding:20px;

}

.chat-container{

    width:100%;
    max-width:950px;
    height:90vh;
    background:white;
    border-radius:20px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.header{

    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
    padding:25px;
    text-align:center;

}

.header h1{

    font-size:32px;
    margin-bottom:8px;

}

.header p{

    opacity:.9;

}

.chat-box{

    flex:1;
    overflow-y:auto;
    padding:25px;
    background:#f3f4f6;

}

.message{

    display:flex;
    margin-bottom:20px;

}

.user{

    justify-content:flex-end;

}

.bot{

    justify-content:flex-start;

}

.bubble{

    max-width:85%;
    padding:16px 20px;
    border-radius:18px;
    font-size:16px;
    line-height:1.8;
    word-break:break-word;
    white-space: normal;
    line-height: 1.6;
    overflow-wrap: break-word;


}

.user .bubble{

    background:#2563eb;
    color:white;
    border-bottom-right-radius:5px;

}

.bot .bubble{

    background:white;
    color:#222;
    border-bottom-left-radius:5px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.input-area{

    display:flex;
    padding:20px;
    border-top:1px solid #ddd;
    background:white;

}

.input-area input{

    flex:1;
    padding:16px;
    border:2px solid #ddd;
    border-radius:12px;
    outline:none;
    font-size:16px;
    transition:.3s;

}

.input-area input:focus{

    border-color:#2563eb;

}

.input-area button{

    margin-left:15px;
    padding:0 35px;
    border:none;
    border-radius:12px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;

}

.input-area button:hover{

    background:#1d4ed8;
    transform:translateY(-2px);

}

/* Markdown */

.markdown-body h1,
.markdown-body h2,
.markdown-body h3{

    margin-top:15px;
    margin-bottom:10px;

}

.markdown-body p{

    margin-bottom:12px;

}

.markdown-body ul,
.markdown-body ol{

    padding-left:25px;
    margin:10px 0;

}

.markdown-body li{

    margin-bottom:8px;

}

.markdown-body pre{

    background:#1e1e1e;
    color:#f8f8f2;
    padding:15px;
    border-radius:10px;
    overflow-x:auto;
    margin-top:15px;
    margin-bottom:15px;

}

.markdown-body code{

    font-family:Consolas,monospace;

}

.markdown-body pre code{

    background:none;
    color:inherit;

}

.markdown-body table{

    border-collapse:collapse;
    margin-top:15px;

}

.markdown-body table,
.markdown-body th,
.markdown-body td{

    border:1px solid #ddd;

}

.markdown-body th,
.markdown-body td{

    padding:10px;

}

::-webkit-scrollbar{

    width:8px;

}

::-webkit-scrollbar-thumb{

    background:#bbb;
    border-radius:10px;

}
.tool-bar{

    display:flex;
    gap:10px;
    padding:14px 20px;
    background:white;
    border-bottom:1px solid #ececec;

}

.tool-btn{

    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 16px;
    text-decoration:none;
    color:#444;
    background:#f5f5f5;
    border:1px solid transparent;
    border-radius:20px;
    font-size:14px;
    font-weight:500;
    transition:all .2s ease;

}

.tool-btn:hover{

    background:#ececec;

}

.tool-btn.active{

    background:#111827;
    color:white;

}

@media(max-width:600px){

body{

    padding:0;
    height:100vh;

}

.chat-container{

    max-width:100%;
    height:100vh;
    border-radius:0;

}

.header{

    padding:16px;

}

.header h1{

    font-size:22px;

}

.tool-bar{

    padding:10px 14px;
    overflow-x:auto;

}

.tool-btn{

    padding:7px 12px;
    font-size:13px;
    white-space:nowrap;

}

.chat-box{

    padding:16px;

}

.bubble{

    max-width:92%;
    padding:12px 16px;
    font-size:15px;

}

.input-area{

    padding:14px;

}

.input-area input{

    padding:12px;
    font-size:15px;

}

.input-area button{

    margin-left:10px;
    padding:0 20px;
    font-size:15px;

}

}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">

<h1>🤖 AI Coding Assistant</h1>

<p>Ask me anything about programming</p>

</div>
<div class="tool-bar">

    <a href="/" class="tool-btn active">
        💻 Coding
    </a>

    <a href="/image" class="tool-btn">
        🎨 Images
    </a>

</div>

<div class="chat-box" id="chatBox">

{% if chat_response %}

{% for chat in chat_response %}

<div class="message user">

<div class="bubble">

{{ chat.user }}

</div>

</div>

<div class="message bot">

<div class="bubble markdown-body">

{{ chat.bot }}

</div>

</div>

{% endfor %}

{% else %}

<div class="message bot">

<div class="bubble markdown-body">

# 👋 Welcome!

I'm your AI Coding Assistant.



</div>

</div>

{% endif %}

</div>

<div class="input-area" id="footer">

<input id="userinput"
type="text"
name="user_input"
placeholder="Type your coding question..."
autocomplete="off"
required>

<button type="submit" id="sendbutton">

Send

</button>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>

let websocketUrl = "";

if (window.location.hostname === "127.0.0.1" ||
    window.location.hostname === "localhost") {

    websocketUrl = "ws://127.0.0.1:8000/ws";

} else {

    websocketUrl = `wss://${window.location.host}/ws`;

}

const ws = new WebSocket(websocketUrl);

const sendButton = document.getElementById("sendbutton");
const userInput = document.getElementById("userinput");

let botMessage = null;
let aiResponse = "";
let isStreaming = false;

function scrollToBottom() {
    chatBox.scrollTop = chatBox.scrollHeight;
}

function createUserMessage(text) {

    const div = document.createElement("div");

    div.className = "message user";

    div.innerHTML = `
        <div class="bubble">
            ${text}
        </div>
    `;

    chatBox.appendChild(div);

    scrollToBottom();
}

function createBotMessage() {

    const div = document.createElement("div");

    div.className = "message bot";

    div.innerHTML = `
        <div class="bubble markdown-body">
            <span style="opacity:.6;">Thinking...</span>
        </div>
    `;

    chatBox.appendChild(div);

    botMessage = div.querySelector(".markdown-body");

    aiResponse = "";

    scrollToBottom();
}

ws.onopen = () => {
    console.log("Connected");
};

ws.onclose = () => {
    console.log("Disconnected");
};

ws.onerror = (err) => {
    console.error(err);
};

ws.onmessage = (event) => {

    if (!isStreaming) {

        createBotMessage();

        isStreaming = true;

    }

    aiResponse += event.data;

    botMessage.innerHTML = marked.parse(aiResponse);

   
    if (window.hljs) {
        botMessage.querySelectorAll("pre code").forEach((block) => {
            hljs.highlightElement(block);
        });
    }

    scrollToBottom();

};

function sendMessage() {

    const message = userInput.value.trim();

    if (message === "")
        return;

    createUserMessage(message);

    ws.send(message);

    userInput.value = "";

    userInput.focus();

    isStreaming = false;

    sendButton.disabled = true;

}

sendButton.onclick = sendMessage;

userInput.addEventListener("keydown", function(e){

    if(e.key === "Enter" && !e.shiftKey){

        e.preventDefault();

        sendMessage();

    }

});

ws.addEventListener("message", () => {

    clearTimeout(window.finishTimer);

    window.finishTimer = setTimeout(() => {

        sendButton.disabled = false;

    },250);

});


document.querySelectorAll(".markdown-body").forEach((element) => {
    element.innerHTML = marked.parse(element.textContent);
});
</script>

</body>
</html>
